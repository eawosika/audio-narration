<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audio Narration · Rialo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#f0eeea;min-height:100vh}

/* Layout */
.shell{max-width:760px;margin:0 auto;padding:48px 24px 64px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid rgba(169,221,211,0.1);margin-bottom:32px}
.header-left{display:flex;align-items:baseline;gap:10px}
.header h1{font-size:18px;font-weight:600;color:#f0eeea;letter-spacing:-0.01em}
.header .tag{font-size:11px;color:#a9ddd3;background:rgba(169,221,211,0.08);border:1px solid rgba(169,221,211,0.15);padding:2px 8px;border-radius:4px}

/* Stats row */
.stats{display:flex;gap:24px;margin-bottom:32px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-size:22px;font-weight:600;color:#f0eeea}
.stat-label{font-size:12px;color:rgba(240,238,234,0.35)}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.toolbar-left{display:flex;gap:8px}
.toolbar-right{display:flex;gap:8px}

/* Buttons */
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit;border:1px solid transparent;line-height:1.4}
.btn-primary{background:rgba(169,221,211,0.08);color:#a9ddd3;border-color:rgba(169,221,211,0.2)}
.btn-primary:hover{background:rgba(169,221,211,0.15)}
.btn-ghost{background:transparent;color:rgba(240,238,234,0.5);border-color:rgba(240,238,234,0.08)}
.btn-ghost:hover{background:rgba(240,238,234,0.04);color:rgba(240,238,234,0.7)}
.btn-danger{background:transparent;color:rgba(240,100,100,0.7);border-color:rgba(240,90,90,0.15)}
.btn-danger:hover{background:rgba(240,90,90,0.06);color:rgba(240,100,100,0.85)}
.btn:disabled{opacity:0.25;cursor:default;pointer-events:none}
.btn-sm{padding:5px 10px;font-size:11px}

/* Article list */
.article-list{display:flex;flex-direction:column;gap:1px;background:rgba(240,238,234,0.04);border:1px solid rgba(169,221,211,0.1);border-radius:8px;overflow:hidden}
.article-row{background:#0a0a0a;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:background 0.1s}
.article-row:hover{background:#0e0e0e}
.article-info{flex:1;min-width:0}
.article-title{font-size:14px;font-weight:500;color:#f0eeea;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.article-title a{color:inherit;text-decoration:none}
.article-title a:hover{color:#a9ddd3}
.article-slug{font-size:11px;color:rgba(240,238,234,0.22);font-family:ui-monospace,monospace}
.article-status{flex-shrink:0;width:72px;text-align:center}
.status-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:4px}
.status-cached{background:rgba(169,221,211,0.08);color:#a9ddd3;border:1px solid rgba(169,221,211,0.15)}
.status-none{background:rgba(240,238,234,0.03);color:rgba(240,238,234,0.3);border:1px solid rgba(240,238,234,0.06)}
.status-loading{background:rgba(240,180,50,0.06);color:rgba(240,180,50,0.8);border:1px solid rgba(240,180,50,0.15)}
.status-error{background:rgba(240,90,90,0.06);color:rgba(240,100,100,0.75);border:1px solid rgba(240,90,90,0.12)}
.article-actions{display:flex;gap:6px;flex-shrink:0}
.article-log{font-size:11px;color:rgba(240,238,234,0.3);margin-top:6px;min-height:0}
.article-audio{margin-top:8px}
.article-audio audio{width:100%;height:32px;border-radius:6px}

/* Add section */
.add-section{margin-top:24px}
.add-row{display:flex;gap:8px}
.add-input{flex:1;padding:10px 14px;border:1px solid rgba(169,221,211,0.12);border-radius:6px;font-size:13px;background:#111;color:#f0eeea;outline:none;font-family:inherit}
.add-input:focus{border-color:rgba(169,221,211,0.3)}
.add-input::placeholder{color:rgba(240,238,234,0.18)}

/* Footer */
.footer{margin-top:40px;padding-top:20px;border-top:1px solid rgba(169,221,211,0.06);text-align:center;font-size:11px;color:rgba(240,238,234,0.18)}
.footer a{color:rgba(240,238,234,0.3);text-decoration:none}
.footer a:hover{color:#a9ddd3}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:rgba(240,238,234,0.25);font-size:13px}

@media(max-width:600px){
  .shell{padding:32px 16px 48px}
  .stats{gap:16px}
  .stat-val{font-size:18px}
  .article-row{flex-wrap:wrap;gap:10px;padding:14px 16px}
  .article-status{width:auto}
  .article-actions{width:100%}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar-left,.toolbar-right{justify-content:stretch}
  .toolbar .btn{flex:1;text-align:center}
}
</style>
</head>
<body>
<div class="shell">

<div class="header">
  <div class="header-left">
    <h1>Audio Narration</h1>
    <span class="tag">Rialo</span>
  </div>
  <a href="https://www.rialo.io/blog" target="_blank" class="btn btn-ghost btn-sm">View blog</a>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Articles</div></div>
  <div class="stat"><div class="stat-val" id="stat-cached">0</div><div class="stat-label">Audio ready</div></div>
  <div class="stat"><div class="stat-val" id="stat-missing">0</div><div class="stat-label">Missing</div></div>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <button class="btn btn-primary" onclick="genAll()">Generate missing</button>
    <button class="btn btn-ghost" onclick="refreshAll()">Refresh</button>
  </div>
  <div class="toolbar-right">
    <button class="btn btn-ghost btn-sm" onclick="toggleAdd()">+ Add article</button>
  </div>
</div>

<div id="add-panel" style="display:none;margin-bottom:16px">
  <div class="add-row">
    <input id="ns" class="add-input" placeholder="Post slug or rialo.io URL" onkeydown="if(event.key==='Enter')addS()">
    <button class="btn btn-primary" onclick="addS()">Add</button>
  </div>
</div>

<div id="list"></div>

<div class="footer">
  <a href="https://www.rialo.io" target="_blank">rialo.io</a>
  &nbsp;&middot;&nbsp;
  <a href="https://github.com/eawosika/audio-narration" target="_blank">Source</a>
</div>

</div>

<script>
var API='https://audio-narration-production.up.railway.app';
var ARTICLES=[
{slug:'bringing-private-credit-onchain',title:'How to Bring Private Credit Onchain'},
{slug:'rethinking-protocol-upgrades-with-gauss',title:'Rethinking Protocol Upgrades with Gauss'},
{slug:'understanding-distributed-key-generation',title:'Building Blocks of Threshold Cryptography: Distributed Key Generation'},
{slug:'a-practical-guide-to-consistency-in-distributed-systems',title:'A Practical Guide to Consistency in Distributed Systems'},
{slug:'supermodularity-and-system-welfare',title:'Supermodularity and System Welfare'}
];
var statusMap={};

function toggleAdd(){var p=document.getElementById('add-panel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block')document.getElementById('ns').focus()}

function slugToTitle(s){for(var i=0;i<ARTICLES.length;i++){if(ARTICLES[i].slug===s)return ARTICLES[i].title}return s.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()})}

function addS(){var i=document.getElementById('ns'),s=i.value.trim().replace(/^https?:\/\/.*\/posts\//,'').replace(/\/$/,'');if(!s)return;if(!ARTICLES.some(function(a){return a.slug===s})){ARTICLES.push({slug:s,title:slugToTitle(s)});render()}i.value='';document.getElementById('add-panel').style.display='none'}

function updateStats(){var total=ARTICLES.length,cached=0,missing=0;ARTICLES.forEach(function(a){if(statusMap[a.slug]==='ok')cached++;else missing++});document.getElementById('stat-total').textContent=total;document.getElementById('stat-cached').textContent=cached;document.getElementById('stat-missing').textContent=missing}

function render(){
  var c=document.getElementById('list');c.innerHTML='';
  if(ARTICLES.length===0){c.innerHTML='<div class="empty">No articles yet. Add one above.</div>';updateStats();return}
  var wrap=document.createElement('div');wrap.className='article-list';
  ARTICLES.forEach(function(art){
    var s=art.slug;
    var row=document.createElement('div');row.className='article-row';row.id='row-'+s;
    row.innerHTML='<div class="article-info"><div class="article-title"><a href="https://www.rialo.io/posts/'+s+'" target="_blank">'+art.title+'</a></div><div class="article-slug">'+s+'</div><div class="article-log" id="l-'+s+'"></div><div class="article-audio" id="aw-'+s+'"></div></div><div class="article-status" id="sw-'+s+'"><span class="status-badge status-none" id="s-'+s+'">...</span></div><div class="article-actions"><button class="btn btn-primary btn-sm" id="g-'+s+'">Generate</button><button class="btn btn-ghost btn-sm" id="p-'+s+'" style="display:none">Preview</button><button class="btn btn-ghost btn-sm" id="dl-'+s+'" style="display:none">Download</button><button class="btn btn-danger btn-sm" id="d-'+s+'">Delete</button></div>';
    wrap.appendChild(row);
    row.querySelector('#g-'+s).onclick=function(){gen(s)};
    row.querySelector('#d-'+s).onclick=function(){del(s)};
    row.querySelector('#p-'+s).onclick=function(){play(s)};
    row.querySelector('#dl-'+s).onclick=function(){window.location.href=API+'/api/narration/'+s+'/download'};
    chk(s);
  });
  c.appendChild(wrap);
  updateStats();
}

function chk(s){
  var badge=document.getElementById('s-'+s),p=document.getElementById('p-'+s),dl=document.getElementById('dl-'+s);
  badge.textContent='...';badge.className='status-badge status-none';
  fetch(API+'/api/narration/'+s).then(function(r){return r.json()}).then(function(d){
    if(d.exists){badge.textContent='Ready';badge.className='status-badge status-cached';p.style.display='inline-block';p.dataset.u=d.url;dl.style.display='inline-block';statusMap[s]='ok'}
    else{badge.textContent='Missing';badge.className='status-badge status-none';p.style.display='none';dl.style.display='none';statusMap[s]='no'}
    updateStats();
  }).catch(function(){badge.textContent='Error';badge.className='status-badge status-error';statusMap[s]='er';updateStats()})
}

function gen(s){
  var b=document.getElementById('g-'+s),l=document.getElementById('l-'+s),badge=document.getElementById('s-'+s);
  b.disabled=true;b.textContent='Working...';badge.textContent='Generating';badge.className='status-badge status-loading';l.textContent='';
  fetch(API+'/api/narration/'+s+'/auto-generate').then(function(r){return r.json()}).then(function(d){
    if(d.error){badge.textContent='Error';badge.className='status-badge status-error';l.textContent=d.error;statusMap[s]='er'}
    else{l.textContent=(d.textLength||'?')+' chars';chk(s)}
  }).catch(function(err){badge.textContent='Error';badge.className='status-badge status-error';l.textContent=err.message;statusMap[s]='er'}).finally(function(){b.disabled=false;b.textContent='Generate';updateStats()})
}

function del(s){
  if(!confirm('Delete audio for this article?'))return;
  var b=document.getElementById('d-'+s),l=document.getElementById('l-'+s);b.disabled=true;
  fetch(API+'/api/narration/'+s+'/delete').then(function(r){return r.json()}).then(function(d){l.textContent='Deleted '+(d.deleted||0)+' file(s)';chk(s)}).catch(function(err){l.textContent=err.message}).finally(function(){b.disabled=false})
}

function play(s){
  var b=document.getElementById('p-'+s),w=document.getElementById('aw-'+s);
  if(w.querySelector('audio')){w.innerHTML='';b.textContent='Preview';return}
  var a=document.createElement('audio');a.controls=true;a.src=b.dataset.u;w.appendChild(a);a.play();b.textContent='Hide'
}

function genAll(){ARTICLES.forEach(function(art){if(statusMap[art.slug]!=='ok')gen(art.slug)})}
function refreshAll(){ARTICLES.forEach(function(art){chk(art.slug)})}

render();
</script>
</body>
</html>
