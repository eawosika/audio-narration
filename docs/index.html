<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audio Narration · Rialo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#f0eeea;min-height:100vh}
.shell{max-width:760px;margin:0 auto;padding:48px 24px 64px}
.header{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid rgba(169,221,211,0.1);margin-bottom:32px}
.header-left{display:flex;align-items:baseline;gap:10px}
.header h1{font-size:18px;font-weight:600;letter-spacing:-0.01em}
.header .tag{font-size:11px;color:#a9ddd3;background:rgba(169,221,211,0.08);border:1px solid rgba(169,221,211,0.15);padding:2px 8px;border-radius:4px}
.stats{display:flex;gap:24px;margin-bottom:32px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-size:22px;font-weight:600}
.stat-label{font-size:12px;color:rgba(240,238,234,0.35)}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.toolbar-left,.toolbar-right{display:flex;gap:8px}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit;border:1px solid transparent;line-height:1.4}
.btn-primary{background:rgba(169,221,211,0.08);color:#a9ddd3;border-color:rgba(169,221,211,0.2)}
.btn-primary:hover{background:rgba(169,221,211,0.15)}
.btn-ghost{background:transparent;color:rgba(240,238,234,0.5);border-color:rgba(240,238,234,0.08)}
.btn-ghost:hover{background:rgba(240,238,234,0.04);color:rgba(240,238,234,0.7)}
.btn-danger{background:transparent;color:rgba(240,100,100,0.7);border-color:rgba(240,90,90,0.15)}
.btn-danger:hover{background:rgba(240,90,90,0.06)}
.btn:disabled{opacity:0.25;cursor:default;pointer-events:none}
.btn-sm{padding:5px 10px;font-size:11px}
.article-list{display:flex;flex-direction:column;gap:1px;background:rgba(240,238,234,0.04);border:1px solid rgba(169,221,211,0.1);border-radius:8px;overflow:hidden}
.article-row{background:#0a0a0a;padding:16px 20px;transition:background 0.1s}
.article-row:hover{background:#0e0e0e}
.article-head{display:flex;align-items:center;gap:16px;margin-bottom:4px}
.article-info{flex:1;min-width:0}
.article-title{font-size:14px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.article-title a{color:inherit;text-decoration:none}
.article-title a:hover{color:#a9ddd3}
.article-slug{font-size:11px;color:rgba(240,238,234,0.22);font-family:ui-monospace,monospace}
.article-status{flex-shrink:0}
.status-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:4px}
.status-cached{background:rgba(169,221,211,0.08);color:#a9ddd3;border:1px solid rgba(169,221,211,0.15)}
.status-none{background:rgba(240,238,234,0.03);color:rgba(240,238,234,0.3);border:1px solid rgba(240,238,234,0.06)}
.status-loading{background:rgba(240,180,50,0.06);color:rgba(240,180,50,0.8);border:1px solid rgba(240,180,50,0.15)}
.status-error{background:rgba(240,90,90,0.06);color:rgba(240,100,100,0.75);border:1px solid rgba(240,90,90,0.12)}
.article-controls{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.article-log{font-size:11px;color:rgba(240,238,234,0.3);margin-top:6px}
.versions-panel{margin-top:10px;border-top:1px solid rgba(240,238,234,0.06);padding-top:10px}
.version-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:11px}
.version-file{color:rgba(240,238,234,0.4);font-family:ui-monospace,monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.version-date{color:rgba(240,238,234,0.25);flex-shrink:0;width:80px}
.version-active{color:#a9ddd3;font-weight:500;font-size:10px}
audio{width:100%;height:32px;margin-top:6px;border-radius:6px}
.add-section{margin-top:24px}
.add-row{display:flex;gap:8px}
.add-input{flex:1;padding:10px 14px;border:1px solid rgba(169,221,211,0.12);border-radius:6px;font-size:13px;background:#111;color:#f0eeea;outline:none;font-family:inherit}
.add-input:focus{border-color:rgba(169,221,211,0.3)}
.add-input::placeholder{color:rgba(240,238,234,0.18)}
.footer{margin-top:40px;padding-top:20px;border-top:1px solid rgba(169,221,211,0.06);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:rgba(240,238,234,0.18)}
.footer a{color:rgba(240,238,234,0.3);text-decoration:none}
.footer a:hover{color:#a9ddd3}
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:#111;border:1px solid rgba(169,221,211,0.15);border-radius:12px;padding:32px;width:100%;max-width:360px;text-align:center}
.auth-box h2{font-size:18px;font-weight:600;margin-bottom:6px}
.auth-box p{font-size:13px;color:rgba(240,238,234,0.4);margin-bottom:24px}
.auth-input{width:100%;padding:11px 14px;border:1px solid rgba(169,221,211,0.15);border-radius:8px;font-size:14px;background:#0a0a0a;color:#f0eeea;outline:none;font-family:inherit;margin-bottom:12px;text-align:center}
.auth-input:focus{border-color:#a9ddd3}
.auth-input::placeholder{color:rgba(240,238,234,0.2)}
.auth-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.auth-remember{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(240,238,234,0.4);cursor:pointer}
.auth-remember input{cursor:pointer}
.auth-error{font-size:12px;color:rgba(240,100,100,0.8);margin-top:8px;min-height:18px}
.voice-menu-item{padding:8px 14px;cursor:pointer;transition:background 0.1s;display:flex;align-items:center;justify-content:space-between;gap:8px}
.voice-menu-item:hover{background:rgba(169,221,211,0.06)}
@media(max-width:600px){
.shell{padding:32px 16px 48px}
.stats{gap:16px}.stat-val{font-size:18px}
.article-head{flex-wrap:wrap;gap:8px}
.article-controls{flex-direction:column;align-items:stretch}
.toolbar{flex-direction:column;align-items:stretch}
.toolbar-left,.toolbar-right{justify-content:stretch}
.toolbar .btn{flex:1;text-align:center}
}
</style>
</head>
<body>
<div id="auth-screen" class="auth-screen">
<div class="auth-box">
<h2>Audio Narration</h2>
<p>Enter your admin password to continue.</p>
<input id="auth-pw" class="auth-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doAuth()">
<div class="auth-row"><label class="auth-remember"><input type="checkbox" id="auth-remember" checked> Remember this device</label></div>
<button class="btn btn-primary" style="width:100%;padding:10px" onclick="doAuth()">Sign in</button>
<div class="auth-error" id="auth-error"></div>
</div>
</div>
<div id="app" style="display:none">
<div class="shell">
<div class="header">
<div class="header-left"><h1>Audio Narration</h1><span class="tag">Rialo</span></div>
<a href="https://www.rialo.io/blog" target="_blank" class="btn btn-ghost btn-sm">View blog</a>
</div>
<div class="stats">
<div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Articles</div></div>
<div class="stat"><div class="stat-val" id="stat-cached">0</div><div class="stat-label">Audio ready</div></div>
<div class="stat"><div class="stat-val" id="stat-missing">0</div><div class="stat-label">Missing</div></div>
</div>
<div class="toolbar">
<div class="toolbar-left">
<button class="btn btn-primary" onclick="genAll()">Generate missing</button>
<button class="btn btn-ghost" onclick="refreshAll()">Refresh</button>
</div>
<div class="toolbar-right">
<button class="btn btn-ghost btn-sm" onclick="toggleAdd()">+ Add article</button>
</div>
</div>
<div id="add-panel" style="display:none;margin-bottom:16px">
<div class="add-row">
<input id="ns" class="add-input" placeholder="Post slug or rialo.io URL" onkeydown="if(event.key==='Enter')addS()">
<button class="btn btn-primary" onclick="addS()">Add</button>
</div>
</div>
<div id="list"></div>
<div class="footer">
<div><a href="https://www.rialo.io" target="_blank">rialo.io</a> &middot; <a href="https://github.com/eawosika/audio-narration" target="_blank">Source</a></div>
<button class="btn btn-ghost btn-sm" onclick="logout()" style="border:none;padding:4px 8px">Log out</button>
</div>
</div>
</div>
<script>
var API='https://audio-narration-production.up.railway.app';
var TOKEN='';
var VOICES=[
{id:'l30f87tf05uxyknGdDw6',label:'Allistair',desc:'Clear, neutral, informative',url:'https://elevenlabs.io/app/voice-library?voiceId=l30f87tf05uxyknGdDw6'},
{id:'RWLFUuahyl6QdlLs8Al5',label:'Bob',desc:'Deep and insightful',url:'https://elevenlabs.io/app/voice-library?voiceId=RWLFUuahyl6QdlLs8Al5'}
];
var ARTICLES=[
{slug:'bringing-private-credit-onchain',title:'How to Bring Private Credit Onchain'},
{slug:'rethinking-protocol-upgrades-with-gauss',title:'Rethinking Protocol Upgrades with Gauss'},
{slug:'understanding-distributed-key-generation',title:'Building Blocks of Threshold Cryptography: Distributed Key Generation'},
{slug:'a-practical-guide-to-consistency-in-distributed-systems',title:'A Practical Guide to Consistency in Distributed Systems'},
{slug:'supermodularity-and-system-welfare',title:'Supermodularity and System Welfare'}
];
var statusMap={};

function doAuth(){
  var pw=document.getElementById('auth-pw').value;var remember=document.getElementById('auth-remember').checked;var err=document.getElementById('auth-error');err.textContent='';
  fetch(API+'/api/admin/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})})
  .then(function(r){if(!r.ok)throw new Error('Wrong password');return r.json()})
  .then(function(){TOKEN=pw;if(remember)localStorage.setItem('np_admin_token',pw);else sessionStorage.setItem('np_admin_token',pw);showApp()})
  .catch(function(e){err.textContent=e.message});
}
function logout(){TOKEN='';localStorage.removeItem('np_admin_token');sessionStorage.removeItem('np_admin_token');document.getElementById('app').style.display='none';document.getElementById('auth-screen').style.display='flex'}
function showApp(){document.getElementById('auth-screen').style.display='none';document.getElementById('app').style.display='block';render()}
function authHeaders(){return{'x-admin-token':TOKEN,'Content-Type':'application/json'}}

(function(){
  var saved=localStorage.getItem('np_admin_token')||sessionStorage.getItem('np_admin_token');
  if(saved){fetch(API+'/api/admin/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:saved})}).then(function(r){if(r.ok){TOKEN=saved;showApp()}}).catch(function(){});}
})();

function toggleAdd(){var p=document.getElementById('add-panel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block')document.getElementById('ns').focus()}
function slugToTitle(s){for(var i=0;i<ARTICLES.length;i++){if(ARTICLES[i].slug===s)return ARTICLES[i].title}return s.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()})}
function addS(){var i=document.getElementById('ns'),s=i.value.trim().replace(/^https?:\/\/.*\/posts\//,'').replace(/\/$/,'');if(!s)return;if(!ARTICLES.some(function(a){return a.slug===s})){ARTICLES.push({slug:s,title:slugToTitle(s)});render()}i.value='';document.getElementById('add-panel').style.display='none'}
function updateStats(){var t=ARTICLES.length,c=0;ARTICLES.forEach(function(a){if(statusMap[a.slug]==='ok')c++});document.getElementById('stat-total').textContent=t;document.getElementById('stat-cached').textContent=c;document.getElementById('stat-missing').textContent=t-c}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
function fmtDate(d){var dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}

function render(){
  var c=document.getElementById('list');c.innerHTML='';
  if(!ARTICLES.length){c.innerHTML='<div style="text-align:center;padding:40px;color:rgba(240,238,234,0.25);font-size:13px">No articles yet.</div>';updateStats();return}
  var wrap=document.createElement('div');wrap.className='article-list';
  ARTICLES.forEach(function(art){
    var s=art.slug;
    var row=document.createElement('div');row.className='article-row';
    var head=document.createElement('div');head.className='article-head';
    var info=document.createElement('div');info.className='article-info';
    info.innerHTML='<div class="article-title"><a href="https://www.rialo.io/posts/'+s+'" target="_blank">'+art.title+'</a></div><div class="article-slug">'+s+'</div>';
    var statusWrap=document.createElement('div');statusWrap.className='article-status';
    var badge=document.createElement('span');badge.className='status-badge status-none';badge.textContent='...';
    statusWrap.appendChild(badge);
    head.appendChild(info);head.appendChild(statusWrap);

    var controls=document.createElement('div');controls.className='article-controls';
    var voiceWrap=document.createElement('div');voiceWrap.style.cssText='position:relative;display:inline-block';
    var voiceBtn=document.createElement('button');voiceBtn.className='btn btn-ghost btn-sm';voiceBtn.style.cssText='display:flex;align-items:center;gap:6px';
    voiceBtn.innerHTML=VOICES[0].label+' <span style="opacity:0.4;font-size:10px">&#9662;</span>';
    var selectedVoice={id:VOICES[0].id};
    var voiceMenu=document.createElement('div');voiceMenu.style.cssText='display:none;position:absolute;top:calc(100% + 4px);left:0;background:#131313;border:1px solid rgba(169,221,211,0.15);border-radius:8px;padding:6px 0;z-index:100;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,0.3)';
    VOICES.forEach(function(v){
      var item=document.createElement('div');item.className='voice-menu-item';
      var left=document.createElement('div');
      left.innerHTML='<div style="font-size:12px;font-weight:500;color:#f0eeea">'+v.label+'</div><div style="font-size:10px;color:rgba(240,238,234,0.35);margin-top:1px">'+v.desc+'</div>';
      var link=document.createElement('a');link.href=v.url;link.target='_blank';link.rel='noopener';
      link.style.cssText='font-size:10px;color:rgba(169,221,211,0.5);text-decoration:none;flex-shrink:0';
      link.textContent='Preview';link.title='Listen on ElevenLabs';
      link.onmouseenter=function(){link.style.color='#a9ddd3'};link.onmouseleave=function(){link.style.color='rgba(169,221,211,0.5)'};
      link.onclick=function(e){e.stopPropagation()};
      item.appendChild(left);item.appendChild(link);
      item.onclick=function(){selectedVoice.id=v.id;voiceBtn.innerHTML=v.label+' <span style="opacity:0.4;font-size:10px">&#9662;</span>';voiceMenu.style.display='none'};
      voiceMenu.appendChild(item);
    });
    voiceBtn.onclick=function(e){e.stopPropagation();voiceMenu.style.display=voiceMenu.style.display==='none'?'block':'none'};
    document.addEventListener('click',function(){voiceMenu.style.display='none'});
    voiceWrap.appendChild(voiceBtn);voiceWrap.appendChild(voiceMenu);

    var genBtn=document.createElement('button');genBtn.className='btn btn-primary btn-sm';genBtn.textContent='Generate';
    var versionsBtn=document.createElement('button');versionsBtn.className='btn btn-ghost btn-sm';versionsBtn.textContent='Versions';versionsBtn.style.display='none';
    controls.appendChild(voiceWrap);controls.appendChild(genBtn);controls.appendChild(versionsBtn);

    var logEl=document.createElement('div');logEl.className='article-log';
    var versionsPanel=document.createElement('div');versionsPanel.className='versions-panel';versionsPanel.style.display='none';
    row.appendChild(head);row.appendChild(controls);row.appendChild(logEl);row.appendChild(versionsPanel);
    wrap.appendChild(row);

    genBtn.onclick=function(){
      genBtn.disabled=true;genBtn.textContent='Working...';badge.textContent='Generating';badge.className='status-badge status-loading';logEl.textContent='';
      var voiceParam='?token='+encodeURIComponent(TOKEN)+(selectedVoice.id?'&voice='+encodeURIComponent(selectedVoice.id):'');
      fetch(API+'/api/narration/'+s+'/auto-generate'+voiceParam).then(function(r){return r.json()}).then(function(d){
        if(d.error){badge.textContent='Error';badge.className='status-badge status-error';logEl.textContent=d.error}
        else{logEl.textContent=(d.textLength||'?')+' chars · voice: '+(d.voice||'default');doChk();loadVersions()}
      }).catch(function(err){badge.textContent='Error';badge.className='status-badge status-error';logEl.textContent=err.message}).finally(function(){genBtn.disabled=false;genBtn.textContent='Generate';updateStats()})
    };

    versionsBtn.onclick=function(){
      if(versionsPanel.style.display==='none'){versionsPanel.style.display='block';versionsBtn.textContent='Hide versions';loadVersions()}
      else{versionsPanel.style.display='none';versionsBtn.textContent='Versions'}
    };

    function loadVersions(){
      versionsPanel.innerHTML='<div style="font-size:11px;color:rgba(240,238,234,0.3)">Loading...</div>';
      fetch(API+'/api/narration/'+s+'/versions').then(function(r){return r.json()}).then(function(data){
        versionsPanel.innerHTML='';
        if(!data.versions||!data.versions.length){versionsPanel.innerHTML='<div style="font-size:11px;color:rgba(240,238,234,0.2)">No versions</div>';return}
        data.versions.forEach(function(v){
          var vr=document.createElement('div');vr.className='version-row';
          var fileEl=document.createElement('span');fileEl.className='version-file';fileEl.textContent=v.filename;
          var dateEl=document.createElement('span');dateEl.className='version-date';dateEl.textContent=fmtDate(v.created);
          var sizeEl=document.createElement('span');sizeEl.style.cssText='color:rgba(240,238,234,0.25);font-size:10px;width:50px;flex-shrink:0';sizeEl.textContent=fmtSize(v.size);
          var vActions=document.createElement('span');vActions.style.cssText='display:flex;gap:4px;flex-shrink:0';
          if(v.active){var al=document.createElement('span');al.className='version-active';al.textContent='Active';vActions.appendChild(al)}
          else{var sb=document.createElement('button');sb.className='btn btn-primary btn-sm';sb.style.padding='3px 8px';sb.textContent='Set active';sb.onclick=function(){fetch(API+'/api/narration/'+s+'/set-active',{method:'POST',headers:authHeaders(),body:JSON.stringify({filename:v.filename})}).then(function(r){return r.json()}).then(function(){loadVersions();doChk()})};vActions.appendChild(sb)}
          var pb=document.createElement('button');pb.className='btn btn-ghost btn-sm';pb.style.padding='3px 8px';pb.textContent='Play';var ae=null;
          pb.onclick=function(){if(ae){ae.remove();ae=null;pb.textContent='Play';return}ae=document.createElement('audio');ae.controls=true;ae.src=v.url;ae.style.cssText='width:100%;height:32px;margin-top:4px';vr.after(ae);ae.play();pb.textContent='Stop'};
          vActions.appendChild(pb);
          var db=document.createElement('button');db.className='btn btn-danger btn-sm';db.style.padding='3px 8px';db.textContent='Delete';
          db.onclick=function(){if(!confirm('Delete this version?'))return;fetch(API+'/api/narration/'+s+'/delete-version',{method:'POST',headers:authHeaders(),body:JSON.stringify({filename:v.filename})}).then(function(r){return r.json()}).then(function(){loadVersions();doChk()})};
          vActions.appendChild(db);
          vr.appendChild(fileEl);vr.appendChild(dateEl);vr.appendChild(sizeEl);vr.appendChild(vActions);
          versionsPanel.appendChild(vr);
        });
      }).catch(function(){versionsPanel.innerHTML='<div style="font-size:11px;color:rgba(240,100,100,0.6)">Failed to load</div>'});
    }

    function doChk(){
      badge.textContent='...';badge.className='status-badge status-none';
      fetch(API+'/api/narration/'+s).then(function(r){return r.json()}).then(function(d){
        if(d.exists){badge.textContent='Ready';badge.className='status-badge status-cached';versionsBtn.style.display='inline-block';statusMap[s]='ok'}
        else{badge.textContent='Missing';badge.className='status-badge status-none';statusMap[s]='no'}
        updateStats()
      }).catch(function(){badge.textContent='Error';badge.className='status-badge status-error';statusMap[s]='er';updateStats()})
    }
    doChk();
  });
  c.appendChild(wrap);updateStats();
}

function genAll(){document.querySelectorAll('.article-row').forEach(function(row){var b=row.querySelector('.status-badge');if(b&&(b.textContent==='Missing'||b.textContent==='Error')){var btn=row.querySelector('.btn-primary');if(btn&&btn.textContent==='Generate')btn.click()}})}
function refreshAll(){render()}
</script>
</body>
</html>
